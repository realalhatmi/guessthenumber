<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>لعبة الكلمات | مسجل الكلمات</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f4f7fc;  /* ناعم و مريح */
            font-family: system-ui, 'Segoe UI', 'Tahoma', 'Noto Sans Arabic', sans-serif;
            padding: 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* الحاوية الرئيسية */
        .app-container {
            max-width: 650px;
            width: 100%;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.05), 0 0 0 1px rgba(0, 0, 0, 0.02);
            overflow: hidden;
            padding: 1.8rem 1.5rem 2rem;
            transition: all 0.2s ease;
        }

        /* العنوان الرئيسي */
        h1 {
            font-size: 1.9rem;
            font-weight: 600;
            color: #1e3a5f;
            margin-bottom: 0.25rem;
            letter-spacing: -0.3px;
            text-align: center;
        }

        .sub {
            text-align: center;
            color: #5f7f9e;
            font-size: 0.9rem;
            border-bottom: 1px solid #e2edf2;
            padding-bottom: 1rem;
            margin-bottom: 1.8rem;
        }

        /* قسم الإدخال */
        .input-section {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .input-wrapper {
            flex: 2;
            min-width: 160px;
        }

        .word-input {
            width: 100%;
            padding: 14px 18px;
            font-size: 1.25rem;
            font-family: inherit;
            border: 1.5px solid #d4e0e9;
            border-radius: 28px;
            background: #ffffff;
            transition: 0.2s;
            text-align: right;
            color: #1f2e3a;
            font-weight: 500;
        }

        .word-input:focus {
            outline: none;
            border-color: #2c7da0;
            box-shadow: 0 0 0 3px rgba(44, 125, 160, 0.15);
        }

        button {
            background: #2c7da0;
            border: none;
            padding: 0 24px;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 500;
            font-family: inherit;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        button:active {
            transform: scale(0.96);
        }

        button:focus-visible {
            outline: 2px solid #1e5a7a;
            outline-offset: 2px;
        }

        .btn-add {
            background: #2c7da0;
            min-width: 90px;
        }

        .btn-add:hover {
            background: #1f6685;
        }

        .btn-clear-all {
            background: #e0e7ed;
            color: #3c5a73;
            box-shadow: none;
        }

        .btn-clear-all:hover {
            background: #cdd9e2;
        }

        /* شريط العداد والإجراءات */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 1.3rem;
            background: #f0f5f9;
            padding: 0.7rem 1.2rem;
            border-radius: 60px;
        }

        .counter {
            font-size: 1.25rem;
            font-weight: 600;
            background: #ffffffcc;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            color: #1e3a5f;
        }

        .counter span {
            font-size: 1.5rem;
            font-weight: 800;
            margin-left: 5px;
            color: #1e5a7a;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-export, .btn-clear-all {
            font-size: 0.9rem;
            padding: 6px 18px;
            border-radius: 32px;
        }

        .btn-export {
            background: #3b8b5e;
        }

        .btn-export:hover {
            background: #2d6e4a;
        }

        /* قائمة الكلمات */
        .words-list-container {
            margin-top: 1rem;
            max-height: 380px;
            overflow-y: auto;
            border-radius: 24px;
            background: #fefefe;
        }

        .words-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .word-item {
            background: #ffffff;
            border: 1px solid #e2edf2;
            border-radius: 20px;
            padding: 12px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .word-text {
            font-size: 1.4rem;
            font-weight: 500;
            color: #1a2c3c;
            letter-spacing: -0.2px;
            word-break: break-word;
            padding-left: 12px;
        }

        .delete-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #b6c8d6;
            padding: 6px 10px;
            border-radius: 40px;
            transition: 0.2s;
            box-shadow: none;
            line-height: 1;
        }

        .delete-btn:hover {
            color: #d9534f;
            background: #fef2f0;
            transform: scale(1.02);
        }

        /* رسالة النجاح المؤقتة */
        .toast-msg {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c3e2fcc;
            backdrop-filter: blur(6px);
            color: white;
            padding: 8px 20px;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 1000;
            transition: opacity 0.2s;
            pointer-events: none;
            white-space: nowrap;
        }

        /* مودال التصدير */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 1100;
            backdrop-filter: blur(3px);
        }

        .modal-card {
            background: white;
            width: 90%;
            max-width: 500px;
            border-radius: 36px;
            padding: 1.5rem;
            box-shadow: 0 25px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        .modal-card h3 {
            font-size: 1.6rem;
            margin-bottom: 1rem;
            color: #1e3a5f;
        }

        .export-text {
            background: #f1f5f9;
            padding: 1rem;
            border-radius: 24px;
            text-align: right;
            font-size: 1rem;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 200px;
            overflow: auto;
            margin: 1rem 0;
            border: 1px solid #cbdbe0;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 10px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            font-size: 1rem;
        }

        .btn-wa {
            background: #25D366;
        }

        .btn-wa:hover {
            background: #1da858;
        }

        .close-modal {
            background: #9aaebf;
        }

        /* عدم تكرار الكلمات / رسالة سريعة */
        .empty-list-message {
            text-align: center;
            color: #9bb7cd;
            padding: 2rem 0;
            font-size: 1.1rem;
        }

        @media (max-width: 520px) {
            .app-container {
                padding: 1.2rem;
            }
            .word-text {
                font-size: 1.2rem;
            }
            .stats-bar {
                flex-direction: column;
                gap: 12px;
                align-items: stretch;
                border-radius: 28px;
            }
            .action-buttons {
                justify-content: space-between;
            }
            .btn-export, .btn-clear-all {
                flex: 1;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1>📝 لعبة الكلمات</h1>
    <div class="sub">اكتب الكلمة ثم أضفها إلى القائمة</div>

    <!-- قسم الإدخال -->
    <div class="input-section">
        <div class="input-wrapper">
            <input type="text" id="wordInput" class="word-input" placeholder="أدخل كلمة..." autocomplete="off">
        </div>
        <button id="addBtn" class="btn-add">➕ إضافة</button>
    </div>

    <!-- شريط الإحصائيات والأزرار -->
    <div class="stats-bar">
        <div class="counter">📊 عدد الكلمات: <span id="wordCount">0</span></div>
        <div class="action-buttons">
            <button id="exportBtn" class="btn-export">📤 تصدير</button>
            <button id="clearAllBtn" class="btn-clear-all">🗑️ مسح الكل</button>
        </div>
    </div>

    <!-- قائمة الكلمات -->
    <div class="words-list-container">
        <ul id="wordsList" class="words-list">
            <li class="empty-list-message">✨ لا توجد كلمات بعد، أضف كلمة جديدة</li>
        </ul>
    </div>
</div>

<!-- مودال التصدير والمشاركة -->
<div id="exportModal" class="modal">
    <div class="modal-card">
        <h3>📋 تصدير الكلمات</h3>
        <div id="exportPreview" class="export-text"></div>
        <div class="modal-buttons">
            <button id="copyTextBtn" class="close-modal" style="background:#3f6b8c;">📋 نسخ</button>
            <button id="whatsappShareBtn" class="btn-wa">💬 واتساب</button>
            <button id="closeModalBtn" class="close-modal">إغلاق</button>
        </div>
    </div>
</div>

<script>
    // ------------------- الحالة والتخزين -------------------
    let wordsArray = [];   // لتخزين الكلمات بالترتيب (نصوص فريدة)

    // عناصر DOM
    const wordInput = document.getElementById('wordInput');
    const addBtn = document.getElementById('addBtn');
    const wordsListEl = document.getElementById('wordsList');
    const wordCountSpan = document.getElementById('wordCount');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const exportBtn = document.getElementById('exportBtn');

    // مودال التصدير
    const exportModal = document.getElementById('exportModal');
    const exportPreview = document.getElementById('exportPreview');
    const copyTextBtn = document.getElementById('copyTextBtn');
    const whatsappShareBtn = document.getElementById('whatsappShareBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');

    // مساعد عرض رسالة سريعة (toast)
    function showMessage(text, isError = false) {
        // إزالة أي توست سابق
        const existingToast = document.querySelector('.toast-msg');
        if(existingToast) existingToast.remove();

        const toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.textContent = text;
        if(isError) {
            toast.style.background = "#b33b2ccc";
        } else {
            toast.style.background = "#2c7da0dd";
        }
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 300);
        }, 1800);
    }

    // تحديث واجهة قائمة الكلمات + العداد
    function updateWordsListUI() {
        // مسح المحتوى الحالي
        wordsListEl.innerHTML = '';
        
        if(wordsArray.length === 0) {
            // رسالة فارغة لطيفة
            const emptyLi = document.createElement('li');
            emptyLi.className = 'empty-list-message';
            emptyLi.textContent = '📭 لا توجد كلمات، أضف كلمة جديدة';
            wordsListEl.appendChild(emptyLi);
        } else {
            // عرض كل الكلمات
            wordsArray.forEach((word, index) => {
                const li = document.createElement('li');
                li.className = 'word-item';
                li.setAttribute('data-index', index);
                
                const wordSpan = document.createElement('span');
                wordSpan.className = 'word-text';
                wordSpan.textContent = word;
                
                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn';
                delBtn.innerHTML = '✖️';
                delBtn.setAttribute('aria-label', 'حذف الكلمة');
                // إضافة حدث الحذف
                delBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteWordByIndex(index);
                });
                
                li.appendChild(wordSpan);
                li.appendChild(delBtn);
                wordsListEl.appendChild(li);
            });
        }
        // تحديث العداد
        wordCountSpan.textContent = wordsArray.length;
    }
    
    // حذف كلمة بناءً على الفهرس
    function deleteWordByIndex(index) {
        if(index >= 0 && index < wordsArray.length) {
            const removedWord = wordsArray[index];
            wordsArray.splice(index, 1);
            updateWordsListUI();
            showMessage(`✅ تم حذف "${removedWord}"`, false);
        } else {
            showMessage("⚠️ حدث خطأ في الحذف", true);
        }
    }
    
    // إضافة كلمة جديدة (مع التحقق من التكرار والفراغ)
    function addNewWord() {
        let rawWord = wordInput.value.trim();
        if(rawWord === "") {
            showMessage("❌ لا يمكن إضافة كلمة فارغة!", true);
            // تأثير بسيط: تظليل الإدخال
            wordInput.style.borderColor = "#e68a7c";
            setTimeout(() => { wordInput.style.borderColor = "#d4e0e9"; }, 500);
            return false;
        }
        
        // توحيد الكتابة: يمكن الحفاظ على النص كما هو لكن المقارنة case-insensitive (لنفس الكلمة بنفس الحروف)
        // للعربية عموماً نحتاج مقارنة نصية دقيقة لكن منع التكرار الدقيق (نفس التهجئة)
        const isDuplicate = wordsArray.some(existingWord => existingWord === rawWord);
        if(isDuplicate) {
            showMessage(`⚠️ الكلمة "${rawWord}" موجودة مسبقاً!`, true);
            wordInput.value = "";
            wordInput.focus();
            return false;
        }
        
        // إضافة الكلمة
        wordsArray.push(rawWord);
        updateWordsListUI();
        
        // مسح الحقل وإعطاء تغذية راجعة
        wordInput.value = "";
        wordInput.focus();
        
        // تأثير ناجح: وميض على الحاوية (اختياري)
        const container = document.querySelector('.app-container');
        container.style.transition = '0.1s';
        container.style.boxShadow = '0 0 0 2px #2c7da0, 0 6px 18px rgba(0,0,0,0.05)';
        setTimeout(() => {
            container.style.boxShadow = '0 12px 28px rgba(0, 0, 0, 0.05), 0 0 0 1px rgba(0, 0, 0, 0.02)';
        }, 200);
        
        showMessage(`✨ تمت إضافة "${rawWord}" بنجاح!`, false);
        return true;
    }
    
    // مسح جميع الكلمات
    function clearAllWords() {
        if(wordsArray.length === 0) {
            showMessage("⚠️ القائمة فارغة بالفعل", true);
            return;
        }
        if(confirm("هل أنت متأكد من مسح جميع الكلمات؟")) {
            wordsArray = [];
            updateWordsListUI();
            showMessage("🗑️ تم مسح جميع الكلمات", false);
        }
    }
    
    // بناء نص التصدير المنظم حسب المطلوب
    function buildExportText() {
        if(wordsArray.length === 0) {
            return "⚠️ لا توجد كلمات للتصدير.";
        }
        let header = "الكلمات:\n";
        let listItems = wordsArray.map(word => `- ${word}`).join("\n");
        return header + listItems;
    }
    
    // فتح مودال التصدير وتحديث المعاينة
    function openExportModal() {
        const exportContent = buildExportText();
        exportPreview.textContent = exportContent;
        exportModal.style.display = "flex";
    }
    
    // إغلاق المودال
    function closeModal() {
        exportModal.style.display = "none";
    }
    
    // نسخ النص إلى الحافظة
    async function copyExportText() {
        const textToCopy = exportPreview.textContent;
        if(!textToCopy || textToCopy.includes("لا توجد كلمات")) {
            showMessage("❌ لا يوجد محتوى للنسخ", true);
            return;
        }
        try {
            await navigator.clipboard.writeText(textToCopy);
            showMessage("📋 تم نسخ الكلمات إلى الحافظة!", false);
        } catch(err) {
            // Fallback قديم
            const textarea = document.createElement('textarea');
            textarea.value = textToCopy;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            showMessage("📋 تم النسخ (طريقة احتياطية)", false);
        }
    }
    
    // مشاركة واتساب: إنشاء رابط https://wa.me/?text=ENCODED_TEXT
    function shareWhatsApp() {
        const exportContent = buildExportText();
        if(wordsArray.length === 0) {
            showMessage("⚠️ لا توجد كلمات للمشاركة عبر واتساب", true);
            closeModal();
            return;
        }
        // ترميز النص ليكون صالحاً لرابط URL
        const encodedMessage = encodeURIComponent(exportContent);
        const waLink = `https://wa.me/?text=${encodedMessage}`;
        // فتح في نافذة جديدة
        window.open(waLink, '_blank');
        showMessage("📱 جاري فتح واتساب...", false);
        // اختياري: لا نغلق المودال تلقائياً حتى يختار المستخدم
    }
    
    // تهيئة الأحداث
    function initEventListeners() {
        addBtn.addEventListener('click', () => {
            addNewWord();
        });
        
        // إضافة كلمة بالضغط على Enter في حقل الإدخال
        wordInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                e.preventDefault();
                addNewWord();
            }
        });
        
        clearAllBtn.addEventListener('click', clearAllWords);
        
        exportBtn.addEventListener('click', openExportModal);
        
        // أزرار المودال
        copyTextBtn.addEventListener('click', copyExportText);
        whatsappShareBtn.addEventListener('click', shareWhatsApp);
        closeModalBtn.addEventListener('click', closeModal);
        
        // إغلاق المودال عند النقر خارج المحتوى
        exportModal.addEventListener('click', (e) => {
            if(e.target === exportModal) {
                closeModal();
            }
        });
        
        // إضافة لمسة تحسين: منع إضافة كلمات مكررة عن طريق التأكيد في addNewWord مسبقاً.
    }
    
    // optional: مسح الكل مع تأكيد
    // كل الوظائف متكاملة
    
    // بدء التطبيق وتهيئة الحالة الأولية (مصفوفة فارغة)
    function init() {
        wordsArray = [];     // نبدأ بقائمة نظيفة
        updateWordsListUI();
        initEventListeners();
        // التركيز التلقائي على حقل الإدخال
        wordInput.focus();
    }
    
    // بدء التشغيل
    init();
</script>
</body>
</html>
